  +<../variants/heltec_v4/*.cpp>

lib_deps =
  ; MeshCore core = the meshcomod monorepo built as a lib, pinned by tag.
  ; Touch-app files (TouchPrefsStore, WifiRuntimeStore, transports, ...) are
